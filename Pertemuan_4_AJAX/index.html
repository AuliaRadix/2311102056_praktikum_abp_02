<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tampil Profil - AJAX fetch</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent: #8b5cf6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.6s ease-out forwards;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header-text {
            text-align: center;
        }

        h2 {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            font-weight: 300;
        }

        .btn-glow {
            position: relative;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px -10px rgba(139, 92, 246, 0.7);
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 300px;
        }

        .btn-glow:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 15px 25px -10px rgba(139, 92, 246, 0.9);
            background: linear-gradient(135deg, var(--primary-hover), #7c3aed);
        }

        .btn-glow:active {
            transform: translateY(1px) scale(0.98);
        }

        .btn-glow:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #hasil-profil {
            width: 100%;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(15px);
            max-height: 0;
            overflow: hidden;
        }

        #hasil-profil.show {
            opacity: 1;
            transform: translateY(0);
            max-height: 1000px; 
            overflow: visible; 
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--card-border);
            margin-top: 5px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            white-space: nowrap;
        }

        .data-table thead {
            background: rgba(0, 0, 0, 0.4);
        }

        .data-table th {
            padding: 18px 24px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .data-table td {
            padding: 16px 24px;
            font-size: 1.05rem;
            color: #f8fafc;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: background 0.2s ease;
        }

        .data-table tbody tr {
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .data-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .data-table tbody tr:last-child td {
            border-bottom: none;
        }

        .data-table th:first-child,
        .data-table td:first-child {
            width: 60px;
            text-align: center;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            text-align: center;
            color: #f87171;
            background: rgba(239, 68, 68, 0.1);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .empty-message {
            text-align: center;
            color: #94a3b8;
            padding: 30px;
            font-style: italic;
        }

        .icon {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="header-text">
            <h2>Profil Pengguna</h2>
            <p class="subtitle">Platform informasi kepegawaian</p>
        </div>
        
        <button id="btn-tampil" class="btn-glow">
            <svg class="icon icon-user" viewBox="0 0 24 24">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            Tampilkan Tbl Profil
        </button>
        
        <div id="hasil-profil"></div>
    </div>

    <script>
        document.getElementById('btn-tampil').addEventListener('click', function() {
            const hasilDiv = document.getElementById('hasil-profil');
            const btn = document.getElementById('btn-tampil');
            
            hasilDiv.classList.remove('show');
            btn.innerHTML = '<span class="loading-spinner"></span> Memuat Data...';
            btn.disabled = true;

            setTimeout(() => {
                fetch('data.php')
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Network response was not ok');
                        }
                        return response.json();
                    })
                    .then(data => {
                        setTimeout(() => {
                            if (data && data.length > 0) {
                                let tableHTML = `
                                    <div class="table-container">
                                        <table class="data-table">
                                            <thead>
                                                <tr>
                                                    <th>No</th>
                                                    <th>Nama Lengkap</th>
                                                    <th>Posisi / Pekerjaan</th>
                                                    <th>Lokasi Base</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                `;
                                
                                data.forEach((item, index) => {
                                    tableHTML += `
                                        <tr>
                                            <td>${index + 1}</td>
                                            <td>${item.nama}</td>
                                            <td>${item.pekerjaan}</td>
                                            <td>${item.lokasi}</td>
                                        </tr>
                                    `;
                                });

                                tableHTML += `
                                            </tbody>
                                        </table>
                                    </div>
                                `;
                                hasilDiv.innerHTML = tableHTML;
                            } else {
                                hasilDiv.innerHTML = '<div class="empty-message">Tidak ada data profil yang ditemukan.</div>';
                            }
                            hasilDiv.classList.add('show');
                        }, 100);
                    })
                    .catch(error => {
                        console.error('Fetch error:', error);
                        setTimeout(() => {
                            hasilDiv.innerHTML = '<div class="error-message">Terjadi kesalahan saat memuat data dari server.</div>';
                            hasilDiv.classList.add('show');
                        }, 100);
                    })
                    .finally(() => {
                        btn.innerHTML = `
                            <svg class="icon icon-user" viewBox="0 0 24 24">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="9" cy="7" r="4"></circle>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                            </svg>
                            Tampilkan Data
                        `;
                        btn.disabled = false;
                    });
            }, 600);
        });
    </script>

</body>
</html>
